<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Diagnóstico Potree — datos locales</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; background: #1a1a1a; color: #e0e0e0; }
    h1 { font-size: 1.1rem; color: #fff; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
    th, td { border: 1px solid #444; padding: 8px; text-align: left; }
    th { background: #2d2d2d; }
    .ok { color: #27ae60; font-weight: 600; }
    .fail { color: #e74c3c; font-weight: 600; }
    code { background: #2d2d2d; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .hint { margin-top: 20px; padding: 12px; background: #2d2d2d; border-radius: 8px; border-left: 4px solid #c8102e; font-size: 13px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>Diagnóstico de archivos Potree (misma carpeta que metadata.json)</h1>
  <p>Ruta base: <code id="base"></code></p>
  <table>
    <thead>
      <tr><th>Archivo</th><th>HTTP</th><th>Accept-Ranges (octree/hierarchy)</th><th>Notas</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="hint" id="hint"></div>

  <script>
    var base = window.location.origin + '/data/pointclouds/seccion_1/';
    document.getElementById('base').textContent = base;

    var files = [
      { name: 'metadata.json', needRange: false },
      { name: 'hierarchy.bin', needRange: true },
      { name: 'octree.bin', needRange: true }
    ];

    function row(file, status, range, note) {
      var tr = document.createElement('tr');
      var ok = status >= 200 && status < 300;
      tr.innerHTML =
        '<td><code>' + file + '</code></td>' +
        '<td class="' + (ok ? 'ok' : 'fail') + '">' + status + '</td>' +
        '<td>' + (range || '—') + '</td>' +
        '<td>' + note + '</td>';
      return tr;
    }

    Promise.all(files.map(function (f) {
      return fetch(base + f.name, { method: 'HEAD' })
        .then(function (res) {
          return {
            file: f.name,
            status: res.status,
            range: res.headers.get('accept-ranges') || res.headers.get('Accept-Ranges') || '—',
            ok: res.ok
          };
        })
        .catch(function (e) {
          return { file: f.name, status: 'ERROR', range: '—', ok: false, err: String(e) };
        });
    })).then(function (results) {
      var tbody = document.getElementById('rows');
      var hint = document.getElementById('hint');
      var hierOk = results.find(function (r) { return r.file === 'hierarchy.bin' && r.ok; });

      results.forEach(function (r) {
        var note = '';
        if (r.file === 'hierarchy.bin' && !r.ok) {
          note = 'Sin este archivo el visor Potree 2.x no carga. Vuelve a convertir o copia hierarchy.bin.';
        }
        if (r.err) note = r.err;
        tbody.appendChild(row(r.file, r.status, r.range, note));
      });

      if (!hierOk) {
        hint.innerHTML =
          '<strong>Falta o no se puede leer <code>hierarchy.bin</code>.</strong><br><br>' +
          'PotreeConverter 2.x debe generar <strong>tres</strong> archivos juntos: ' +
          '<code>metadata.json</code>, <code>hierarchy.bin</code>, <code>octree.bin</code>.<br><br>' +
          'Vuelve a ejecutar el conversor y copia los <strong>tres</strong> a ' +
          '<code>public/data/pointclouds/seccion_1/</code>.';
      } else {
        hint.innerHTML =
          'Los tres archivos responden. Si el visor sigue en blanco, abre la consola (F12) en ' +
          '<code>/potree/viewer.html?metadata=...</code> y revisa errores de red o de Potree.';
      }
    });
  </script>
</body>
</html>
